<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シンプルRPG</title>
<style>
body{
font-family:sans-serif;
background:#222;
color:white;
text-align:center;
}

button{
padding:10px;
margin:5px;
}

#menu button{
width:120px;
}

.box{
border:1px solid white;
padding:10px;
margin:10px;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<h1>シンプルRPG</h1>

<div id="stone">石:0</div>

<div id="menu">
<button onclick="openHome()">ホーム</button>
<button onclick="openMail()">📧メール</button>
<button onclick="openGacha()">ガチャ</button>
<button onclick="openStage()">ステージ</button>
<button onclick="openParty()">編成</button>
</div>

<div id="content"></div>

<script>

let stone = 0

let mail = [
{title:"運営からのプレゼント",stone:1600,received:false}
]

let characters = []
let weapons = []
let partyWeapon = null

function updateStone(){
document.getElementById("stone").innerText="石:"+stone
}

function setContent(html){
document.getElementById("content").innerHTML=html
}

function openHome(){
setContent("<div class='box'>ホーム画面</div>")
}

function openMail(){

let html="<h2>メール</h2>"

mail.forEach((m,i)=>{

html+=`
<div class="box">
${m.title}<br>
石 ${m.stone}
<br>
${m.received?"受取済":"<button onclick='receiveMail("+i+")'>受け取る</button>"}
</div>
`
})

setContent(html)

}

function receiveMail(i){

if(mail[i].received) return

stone+=mail[i].stone
mail[i].received=true

updateStone()
openMail()

}

function openGacha(){

let html=`
<h2>ガチャ</h2>

<button onclick="characterGacha(1)">キャラ単発(160)</button>
<button onclick="characterGacha(10)">キャラ10連(1600)</button>

<br><br>

<button onclick="weaponGacha(1)">武器単発(160)</button>
<button onclick="weaponGacha(10)">武器10連(1600)</button>
`

setContent(html)

}

function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min
}

function characterGacha(n){

let cost = n*160

if(stone<cost){
alert("石が足りません")
return
}

stone-=cost
updateStone()

for(let i=0;i<n;i++){

let name="キャラ"+rand(1,100)

characters.push({
name:name,
hp:100,
atk:20
})

}

alert(n+"体のキャラを入手")

}

function weaponGacha(n){

let cost = n*160

if(stone<cost){
alert("石が足りません")
return
}

stone-=cost
updateStone()

for(let i=0;i<n;i++){

let r = rand(1,7)

let atk = r*10

weapons.push({
name:"武器R"+r,
rarity:r,
atk:atk
})

}

alert(n+"個の武器を入手")

}

function openParty(){

let html="<h2>武器装備</h2>"

weapons.forEach((w,i)=>{

html+=`
<div class="box">
${w.name}
攻撃:${w.atk}
<button onclick="equip(${i})">装備</button>
</div>
`

})

if(partyWeapon){
html+="<br>現在装備:"+partyWeapon.name
}

setContent(html)

}

function equip(i){

partyWeapon = weapons[i]

openParty()

}

function openStage(){

let html=`
<h2>ステージ1</h2>

<button onclick="startBattle()">開始</button>
`

setContent(html)

}

function startBattle(){

let playerHp=100
let enemyHp=80

let atk = 20

if(partyWeapon){
atk += partyWeapon.atk
}

function render(){

setContent(`
<h2>バトル</h2>

プレイヤーHP:${playerHp}
<br>
敵HP:${enemyHp}
<br><br>

<button onclick="attack()">攻撃</button>
`)
}

window.attack=function(){

enemyHp -= atk

if(enemyHp<=0){

stone+=100
updateStone()

alert("勝利 石100獲得")

openHome()
return
}

playerHp -= 15

if(playerHp<=0){

alert("敗北")

openHome()
return
}

render()

}

render()

}

updateStone()
openHome()

</script>

</body>
</html>
